name: HDHive Checkin

on:
  workflow_dispatch:
  schedule:
    # 17:00 UTC = 01:00 Asia/Shanghai. The job then sleeps randomly.
    - cron: "0 2 * * *"

concurrency:
  group: hdhive-checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    env:
      HDHIVE_ACCOUNTS: ${{ secrets.HDHIVE_ACCOUNTS }}
      HDHIVE_ACCOUNT_1_NAME: ${{ secrets.HDHIVE_ACCOUNT_1_NAME }}
      HDHIVE_COOKIE_1: ${{ secrets.HDHIVE_COOKIE_1 }}
      HDHIVE_ACCOUNT_2_NAME: ${{ secrets.HDHIVE_ACCOUNT_2_NAME }}
      HDHIVE_COOKIE_2: ${{ secrets.HDHIVE_COOKIE_2 }}
      HDHIVE_ACCOUNT_3_NAME: ${{ secrets.HDHIVE_ACCOUNT_3_NAME }}
      HDHIVE_COOKIE_3: ${{ secrets.HDHIVE_COOKIE_3 }}
      HDHIVE_ACCOUNT_4_NAME: ${{ secrets.HDHIVE_ACCOUNT_4_NAME }}
      HDHIVE_COOKIE_4: ${{ secrets.HDHIVE_COOKIE_4 }}
      HDHIVE_ACCOUNT_5_NAME: ${{ secrets.HDHIVE_ACCOUNT_5_NAME }}
      HDHIVE_COOKIE_5: ${{ secrets.HDHIVE_COOKIE_5 }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      RANDOM_DELAY_SECONDS: 1800

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Random delay
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            delay=$(( RANDOM % RANDOM_DELAY_SECONDS ))
            echo "Sleeping ${delay}s before check-in..."
            sleep "$delay"
          else
            echo "Manual run: skip random delay."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run HDHive check-in
        run: python hdhive_checkin_multi.py
